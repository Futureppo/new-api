name: Publish Docker image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional extra image tag"
        required: false
        default: ""
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/amd64"

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: vars
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag }}
          REQUESTED_PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}"
          version="custom-$(date +'%Y%m%d')-${GITHUB_SHA::7}"
          platforms="${REQUESTED_PLATFORMS:-linux/amd64}"

          echo "$version" > VERSION

          {
            echo "image=$image"
            echo "version=$version"
            echo "platforms=$platforms"
            echo "tags<<EOF"
            echo "$image:latest"
            echo "$image:$version"
            if [ -n "$REQUESTED_TAG" ] && [ "$REQUESTED_TAG" != "latest" ]; then
              echo "$image:$REQUESTED_TAG"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.vars.outputs.platforms }}
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Output image tags
        run: |
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.vars.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
